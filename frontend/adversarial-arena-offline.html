// ── SEEDED RANDOM ─────────────────────────────────────────────────────────
class SeededRandom {
  constructor(seed){ this.s = seed % 2147483647; if(this.s <= 0) this.s += 2147483646; }
  next(){ this.s = this.s * 16807 % 2147483647; return (this.s - 1) / 2147483646; }
  pick(arr){ return arr[Math.floor(this.next() * arr.length)]; }
  range(min,max){ return min + this.next() * (max - min); }
}

// ── OFFLINE SIMULATION ────────────────────────────────────────────────────
function simulateAttack(template, fighter, generation, successfulBypasses, mutationRate) {
  const rng = new SeededRandom(Date.now() + generation * 1337 + fighter.elo);
  const atk = ATTACK_DB.find(a => a.type === template.type) || ATTACK_DB[0];
  const vector   = rng.pick(atk.vectors);
  const payload  = rng.pick(atk.payloads);
  const baseEvasion = rng.pick(atk.evasions);
  // If we have successful bypass history, mutate it
  const mutation = mutationRate > 0.5 && successfulBypasses.length > 0
    ? rng.pick(MUTATIONS) + " (mutiert aus: " + successfulBypasses[successfulBypasses.length-1].slice(0,40) + ")"
    : baseEvasion;
  const confidence = Math.min(0.97, rng.range(0.45, 0.72) + fighter.mutationRate * 0.2 + (successfulBypasses.length > 0 ? 0.08 : 0));
  const novelty = successfulBypasses.length > 0
    ? `Generation-${generation}-Mutation: ${rng.pick(MUTATIONS)}`
    : `Erste Iteration dieses Angriffsvektors (Baseline)`;
  return { name:`${atk.type} v${generation}.${Math.floor(rng.next()*9)+1}`, vector, payload, evasion:mutation, tactic:template.tactic, confidence, novelty };
}

function simulateDefense(attack, fighter, failedDefenses, learningRate, generation) {
  const rng = new SeededRandom(Date.now() + generation * 7919 + fighter.elo + 500);
  // Pick defense strategy based on tactic coverage
  const candidates = DEFENSE_DB.filter(d => d.strengths.includes(attack.tactic));
  const base = candidates.length > 0 ? rng.pick(candidates) : rng.pick(DEFENSE_DB);
  // Avoid recently failed strategies
  const failedNames = failedDefenses.map(f => f.defense?.strategy);
  const strategy = DEFENSE_DB.find(d => d.strengths.includes(attack.tactic) && !failedNames.includes(d.strategy)) || base;
  const countermeasure = rng.pick(strategy.countermeasures);
  const gap = rng.pick(strategy.gaps);
  const confidence = Math.min(0.95, rng.range(0.40, 0.68) + fighter.learningRate * 0.22 + (failedDefenses.length > 0 ? 0.06 : 0));
  return { strategy:strategy.strategy, detection:strategy.detection, countermeasure, confidence, weakness:gap, fp_risk:strategy.fp_risk, coverage:`${rng.pick(strategy.gaps).slice(0,60)}...` };
}

function simulateArbitration(attack, defense, generation) {
  const rng = new SeededRandom(Date.now() + generation * 3571 + Math.floor(attack.confidence * 1000));
  // Core logic: attack wins if confidence > defense confidence + complexity bonus
  const attackPower  = attack.confidence * 0.6 + (ATTACK_DB.find(a=>a.type.includes(attack.name.split(" v")[0]))?.complexity || 0.7) * 0.4;
  const defensePower = defense.confidence * 0.65 + (defense.fp_risk === "low" ? 0.1 : defense.fp_risk === "high" ? -0.05 : 0);
  const noise = rng.range(-0.12, 0.12);
  const redScore  = Math.max(0.1, Math.min(0.95, attackPower  + noise));
  const blueScore = Math.max(0.1, Math.min(0.95, defensePower - noise));
  const redWon = redScore > blueScore;
  const REASONS_RED = [
    `${attack.name} nutzt Lücke in ${defense.strategy}: "${defense.weakness}"`,
    `Evasion-Technik "${attack.evasion.slice(0,50)}" umgeht Erkennung erfolgreich`,
    `Angriffs-Konfidenz (${(attack.confidence*100).toFixed(0)}%) übersteigt Verteidigungs-Schwelle`,
    `${defense.countermeasure} deckt diesen Angriffsvektor nicht ab`,
    `Multi-Layer-Evasion überfordert ${defense.strategy}`,
  ];
  const REASONS_BLUE = [
    `${defense.strategy} erkennt Angriffsmuster via "${defense.detection}"`,
    `${defense.countermeasure} blockiert Payload effektiv`,
    `Verteidigungs-Konfidenz (${(defense.confidence*100).toFixed(0)}%) dominiert Angriffsvektor`,
    `FP-Risiko "${defense.fp_risk}" — Defender kann aggressiv blockieren ohne Kollateralschaden`,
    `Coverage des Defenders schließt genau diesen Evasion-Typ ein`,
  ];
  const reason = rng.pick(redWon ? REASONS_RED : REASONS_BLUE);
  const redLearning  = redWon ? `Mutation bestätigt. Weiter optimieren: "${rng.pick(MUTATIONS)}"` : `Evasion war unzureichend. Nächste Gen: ${rng.pick(MUTATIONS)}`;
  const blueLearning = !redWon ? `Erkennung funktioniert. Schwachstelle trotzdem schließen: "${rng.pick(defense.weaknesses||["Keine bekannt"])}"` : `Deckungslücke: "${defense.weakness}" — nächste Gen priorisieren`;
  const realistic = attack.confidence > 0.3 && defense.confidence > 0.3;
  return { winner:redWon?"red":"blue", redScore, blueScore, reason, redLearning, blueLearning, realistic:realistic?"true":"false" };
}

class VectorMemory {
  constructor(){ this.attackStore=[]; this.defenseStore=[]; this.id=0; }
  embed(t){ const kw=["injection","poison","bypass","flood","exfil","spoof","chain","identity","evasion","deepfake","federated","credential","patch","context","timing"]; return kw.map(k=>t.toLowerCase().includes(k)?1:0); }
  cos(a,b){ const d=a.reduce((s,v,i)=>s+v*b[i],0),mA=Math.sqrt(a.reduce((s,v)=>s+v*v,0)),mB=Math.sqrt(b.reduce((s,v)=>s+v*v,0)); return mA&&mB?d/(mA*mB):0; }
  storeAttack(atk,outcome,gen){ this.attackStore.push({id:this.id++,attack:atk,emb:this.embed(`${atk.name} ${atk.vector} ${atk.evasion}`),outcome,gen}); if(this.attackStore.length>200) this.attackStore.shift(); }
  storeDefense(def,score,weak){ this.defenseStore.push({id:this.id++,defense:def,emb:this.embed(`${def.detection} ${def.countermeasure}`),blueScore:score,weakness:weak}); if(this.defenseStore.length>200) this.defenseStore.shift(); }
  successfulAttacks(q,k=3){ const e=this.embed(q); return this.attackStore.filter(x=>x.outcome==="red").map(x=>({...x,sim:this.cos(e,x.emb)})).sort((a,b)=>b.sim-a.sim).slice(0,k); }
  failedDefenses(q,k=3){ const e=this.embed(q); return this.defenseStore.filter(x=>x.blueScore<0.45).map(x=>({...x,sim:this.cos(e,x.emb)})).sort((a,b)=>b.sim-a.sim).slice(0,k); }
  clusterData(){ return this.attackStore.slice(-50).map(e=>({name:e.attack.name?.slice(0,18),tactic:e.attack.tactic,won:e.outcome==="red",gen:e.gen})); }
}

class PopulationEngine {
  constructor(){ this.generation=0; this.redPop=this._init("red",4); this.bluePop=this._init("blue",4); this.history=[]; this.metrics={tp:0,fp:0,fn:0,tn:0}; }
  _init(side,n){ return Array.from({length:n},(_,i)=>({ id:`${side}-${i}`,elo:1200, mutationRate:side==="red"?0.2+i*0.1:0.3, learningRate:side==="blue"?0.2+i*0.1:0.3, wins:0,losses:0,rounds:0, specialization:side==="red"?["injector","poisoner","evader","flooder"][i]:["classifier","anomaly","integrity","adapter"][i] })); }
  _elo(a,op,won,my,opp){ const K=32*(1+Math.abs(my-opp)),exp=1/(1+Math.pow(10,(op.elo-a.elo)/400)); a.elo=Math.round(a.elo+K*((won?1:0)-exp)); a.elo=Math.max(600,Math.min(2400,a.elo)); }
  bestRed(){ return [...this.redPop].sort((a,b)=>b.elo-a.elo)[0]; }
  bestBlue(){ return [...this.bluePop].sort((a,b)=>b.elo-a.elo)[0]; }
  evolve(rW,rS,bS,rA,bA){
    this.generation++;
    this._elo(rA,bA,rW,rS,bS); this._elo(bA,rA,!rW,bS,rS);
    if(!rW){this.metrics.tp++;} else{this.metrics.fn++;}
    rA.rounds++; bA.rounds++;
    if(rW){rA.wins++;bA.losses++;rA.mutationRate=Math.min(0.95,rA.mutationRate+0.04);}
    else  {bA.wins++;rA.losses++;bA.learningRate=Math.min(0.95,bA.learningRate+0.06);}
    if(this.generation%5===0){
      const rs=[...this.redPop].sort((a,b)=>b.elo-a.elo), bs=[...this.bluePop].sort((a,b)=>b.elo-a.elo);
      this.redPop[this.redPop.indexOf(rs[rs.length-1])]={...rs[0],id:`red-m${this.generation}`,elo:1000,wins:0,losses:0,rounds:0,mutationRate:Math.min(0.95,rs[0].mutationRate+0.1)};
      this.bluePop[this.bluePop.indexOf(bs[bs.length-1])]={...bs[0],id:`blue-m${this.generation}`,elo:1000,wins:0,losses:0,rounds:0,learningRate:Math.min(0.95,bs[0].learningRate+0.1)};
    }
    this.history.push({gen:this.generation,redWon:rW,redScore:rS,blueScore:bS,redElo:this.bestRed().elo,blueElo:this.bestBlue().elo,f1:this.f1()});
  }
  f1(){ const{tp,fp,fn}=this.metrics; if(!tp&&!fp&&!fn) return 0; const p=tp/(tp+fp||1),r=tp/(tp+fn||1); return p+r>0?(2*p*r)/(p+r):0; }
  prec(){ const{tp,fp}=this.metrics; return tp+fp>0?tp/(tp+fp):0; }
  rec() { const{tp,fn}=this.metrics; return tp+fn>0?tp/(tp+fn):0; }
}

class MetricTracker {
  constructor(){ this.byTactic={}; }
  record(tactic,blueWon){ if(!this.byTactic[tactic]) this.byTactic[tactic]={tp:0,fn:0,n:0}; this.byTactic[tactic].n++; if(blueWon) this.byTactic[tactic].tp++; else this.byTactic[tactic].fn++; }
  rate(t){ const x=this.byTactic[t]; return x&&x.n>0?x.tp/x.n:null; }
  weakest(){ return Object.entries(this.byTactic).filter(([,v])=>v.n>=2).sort(([,a],[,b])=>a.tp/a.n-b.tp/b.n)[0]?.[0]; }
}

const memory=new VectorMemory(), pop=new PopulationEngine(), mtrk=new MetricTracker();
const ATTACK_TEMPLATES=ATTACK_DB.map(a=>({type:a.type,tactic:a.tactic,complexity:a.complexity}));

const C={red:"#ff2a54",blue:"#00e5ff",gold:"#ffd60a",green:"#06d6a0",purple:"#7b2fff",dim:"rgba(255,255,255,0.25)"};
const f={family:"'Courier New',monospace"};

const Stat=({label,value,color,s})=>(
  <div style={{textAlign:"center",padding:s?"5px 3px":"9px 5px",background:"rgba(255,255,255,0.02)",borderRadius:6}}>
    <div style={{fontSize:s?12:17,fontWeight:800,color:color||"#fff",lineHeight:1}}>{value}</div>
    <div style={{fontSize:7,color:C.dim,letterSpacing:1,marginTop:2}}>{label}</div>
  </div>
);
const Bar=({v,color,h=4})=>(
  <div style={{height:h,borderRadius:2,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
    <div style={{width:`${Math.min((v||0)*100,100)}%`,height:"100%",background:color,borderRadius:2,transition:"width .8s"}}/>
  </div>
);
const Tag=({label,color})=>(
  <span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:`${color}18`,color,border:`1px solid ${color}33`,fontWeight:700,letterSpacing:.5,display:"inline-block"}}>{label}</span>
);

function EloChart({history}){
  if(history.length<2) return <div style={{color:C.dim,fontSize:9,textAlign:"center",padding:14}}>Noch keine Daten…</div>;
  const W=290,H=78,P=10,pts=history.slice(-22);
  const all=pts.flatMap(p=>[p.redElo,p.blueElo]);
  const mn=Math.min(...all)-30,mx=Math.max(...all)+30;
  const tx=i=>P+(i/(pts.length-1))*(W-P*2);
  const ty=v=>H-P-((v-mn)/(mx-mn))*(H-P*2);
  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:3,fontSize:8}}>
        <span style={{color:C.red}}>● Red ELO</span><span style={{color:C.blue}}>● Blue ELO</span><span style={{color:C.green}}>- F1</span>
      </div>
      <svg width={W} height={H} style={{display:"block"}}>
        <path d={pts.map((p,i)=>`${i===0?"M":"L"}${tx(i)},${ty(p.redElo)}`).join(" ")} fill="none" stroke={C.red} strokeWidth={1.5}/>
        <path d={pts.map((p,i)=>`${i===0?"M":"L"}${tx(i)},${ty(p.blueElo)}`).join(" ")} fill="none" stroke={C.blue} strokeWidth={1.5}/>
        <path d={pts.map((p,i)=>`${i===0?"M":"L"}${tx(i)},${ty(mn+(p.f1||0)*(mx-mn))}`).join(" ")} fill="none" stroke={C.green} strokeWidth={1} strokeDasharray="3,3"/>
        {pts.map((p,i)=><g key={i}><circle cx={tx(i)} cy={ty(p.redElo)} r={2} fill={C.red}/><circle cx={tx(i)} cy={ty(p.blueElo)} r={2} fill={C.blue}/></g>)}
      </svg>
    </div>
  );
}

function MitreMap({mtrk}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
      {Object.entries(MITRE).map(([id,t])=>{
        const r=mtrk.rate(id);
        return(
          <div key={id} style={{padding:"5px 7px",borderRadius:6,background:t.color,opacity:r!=null?0.15+r*0.65:0.1,border:`1px solid ${t.color}44`,transition:"all .6s"}}>
            <div style={{fontSize:7,color:"#fff",opacity:.7}}>{id}</div>
            <div style={{fontSize:8,color:"#fff",opacity:.85,marginTop:1,lineHeight:1.2}}>{t.name}</div>
            <div style={{fontSize:10,fontWeight:800,color:"#fff",marginTop:2}}>{r!=null?`${(r*100).toFixed(0)}%`:"—"}</div>
          </div>
        );
      })}
    </div>
  );
}

function AttackMap({memory,gen}){
  const data=memory.clusterData();
  if(data.length<3) return <div style={{color:C.dim,fontSize:9,textAlign:"center",padding:14}}>Braucht min. 3 Runden…</div>;
  const to=Object.keys(MITRE);
  return(
    <div style={{position:"relative",height:120,background:"rgba(255,255,255,0.015)",borderRadius:8,overflow:"hidden"}}>
      {data.map((d,i)=>{
        const ti=to.indexOf(d.tactic);
        const x=ti>=0?(ti/(to.length-1))*88+2:50;
        const y=Math.max(3,Math.min(88,(d.gen/(gen||1))*85+3));
        const tc=MITRE[d.tactic]?.color||(d.won?C.red:C.blue);
        return <div key={i} title={`${d.name} (G${d.gen})`} style={{position:"absolute",left:`${x}%`,top:`${y}%`,width:7,height:7,borderRadius:"50%",background:tc,opacity:d.won?.9:.45,border:d.won?`1px solid ${C.red}`:"none",transition:"all .4s"}}/>;
      })}
      <div style={{position:"absolute",bottom:2,left:5,fontSize:7,color:C.dim}}>← MITRE Tactic →</div>
      <div style={{position:"absolute",bottom:2,right:5,display:"flex",gap:5,fontSize:7}}>
        <span style={{color:C.red}}>● bypass</span><span style={{color:C.blue,opacity:.5}}>● blocked</span>
      </div>
    </div>
  );
}

function PopTable({popArr,side}){
  const c=side==="red"?C.red:C.blue;
  return(
    <div>
      {[...popArr].sort((a,b)=>b.elo-a.elo).map((ag,i)=>(
        <div key={ag.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:9,color:i===0?c:C.dim,fontWeight:i===0?800:400,minWidth:14}}>{i===0?"★":i+1}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:i===0?c:"rgba(255,255,255,0.5)",fontWeight:700}}>{ag.specialization}</div>
            <Bar v={(ag.elo-600)/1800} color={c} h={3}/>
          </div>
          <div style={{fontSize:10,fontWeight:800,color:i===0?c:C.dim}}>{ag.elo}</div>
          <div style={{fontSize:8,color:"rgba(255,255,255,0.2)"}}>{ag.wins}W/{ag.losses}L</div>
        </div>
      ))}
    </div>
  );
}

function RoundCard({round}){
  const rw=round.verdict?.winner==="red",wc=rw?C.red:C.blue;
  const tac=MITRE[round.tactic];
  return(
    <div style={{border:`1px solid ${wc}28`,borderRadius:8,padding:10,background:`${wc}05`,animation:"fadeIn .4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:8,color:C.dim}}>G{round.generation}</span>
          {tac&&<Tag label={tac.name} color={tac.color}/>}
          {round.verdict?.realistic==="false"&&<Tag label="LOW REALISM" color={C.gold}/>}
        </div>
        <Tag label={rw?"RED WINS":"BLUE WINS"} color={wc}/>
      </div>
      {round.attack&&(<div style={{marginBottom:5}}>
        <div style={{fontSize:9,color:C.red,fontWeight:700}}>⚔ {round.attack.name}</div>
        <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",lineHeight:1.4,marginTop:1}}>{round.attack.novelty?.slice(0,80)}</div>
      </div>)}
      {round.defense&&(<div style={{marginBottom:5}}>
        <div style={{fontSize:9,color:C.blue,fontWeight:700}}>⬡ {round.defense.strategy}</div>
        <div style={{fontSize:8,color:"rgba(255,100,100,0.4)",lineHeight:1.4,marginTop:1}}>Gap: {round.defense.weakness?.slice(0,70)}</div>
      </div>)}
      {round.verdict?.reason&&<div style={{fontSize:8,color:"rgba(255,255,255,0.3)",borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:5,lineHeight:1.5}}>{round.verdict.reason}</div>}
      <div style={{display:"flex",gap:6,marginTop:5,alignItems:"center"}}>
        <div style={{flex:1}}><Bar v={round.verdict?.redScore||0} color={C.red}/></div>
        <div style={{flex:1}}><Bar v={round.verdict?.blueScore||0} color={C.blue}/></div>
        <span style={{fontSize:7,color:C.dim,whiteSpace:"nowrap"}}>{round.redElo}:{round.blueElo}</span>
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [running,setRunning]     = useState(false);
  const [autoLoop,setAutoLoop]   = useState(false);
  const [rounds,setRounds]       = useState([]);
  const [phase,setPhase]         = useState("idle");
  const [curAtk,setCurAtk]       = useState(null);
  const [curDef,setCurDef]       = useState(null);
  const [status,setStatus]       = useState("Bereit — keine API nötig. Doppelklick auf HTML-Datei genügt.");
  const [tab,setTab]             = useState("arena");
  const [humanFB,setHumanFB]     = useState("");
  const [pendingFB,setPending]   = useState("");
  const [snap,setSnap]           = useState({gen:0,redElo:1200,blueElo:1200,f1:0,prec:0,rec:0});
  const [replaced,setReplaced]   = useState(null);
  const abortRef=useRef(false), loopRef=useRef(false);

  const doSnap=useCallback(()=>setSnap({gen:pop.generation,redElo:pop.bestRed().elo,blueElo:pop.bestBlue().elo,f1:pop.f1(),prec:pop.prec(),rec:pop.rec()}),[]);

  const runRound=useCallback(async()=>{
    if(running) return;
    setRunning(true); abortRef.current=false;
    const red=pop.bestRed(), blue=pop.bestBlue();
    const tmpl=ATTACK_TEMPLATES[Math.floor(Math.random()*ATTACK_TEMPLATES.length)];
    const gen=pop.generation+1;

    setPhase("red");
    setStatus(`Gen ${gen} — ${red.specialization} generiert Angriff [${MITRE[tmpl.tactic]?.name}]…`);
    await new Promise(r=>setTimeout(r,350));
    if(abortRef.current){setRunning(false);return;}

    const successfulBypasses=memory.successfulAttacks(tmpl.type).map(e=>e.attack.evasion);
    const attack=simulateAttack(tmpl,red,gen,successfulBypasses,red.mutationRate);
    setCurAtk(attack);
    setStatus(`Red: "${attack.name}" | Konfidenz ${(attack.confidence*100).toFixed(0)}%`);
    await new Promise(r=>setTimeout(r,400));
    if(abortRef.current){setRunning(false);return;}

    setPhase("blue");
    setStatus(`Gen ${gen} — ${blue.specialization} analysiert und reagiert…`);
    await new Promise(r=>setTimeout(r,350));

    const failedDefs=memory.failedDefenses(attack.vector);
    const defense=simulateDefense(attack,blue,failedDefs,blue.learningRate,gen);
    setCurDef(defense);
    setStatus(`Blue: "${defense.strategy}" | FP-Risiko: ${defense.fp_risk}`);
    await new Promise(r=>setTimeout(r,400));
    if(abortRef.current){setRunning(false);return;}

    setPhase("arbiter");
    setStatus(`Gen ${gen} — Blind-Schiedsrichter bewertet…`);
    await new Promise(r=>setTimeout(r,300));

    const verdict=simulateArbitration(attack,defense,gen);
    const redWon=verdict.winner==="red";

    memory.storeAttack(attack,verdict.winner,gen);
    memory.storeDefense(defense,verdict.blueScore,defense.weakness);
    mtrk.record(tmpl.tactic,!redWon);

    const wasPreSwap=pop.generation%5===4;
    pop.evolve(redWon,verdict.redScore,verdict.blueScore,red,blue);
    if(wasPreSwap) setReplaced(pop.generation);
    if(humanFB) setHumanFB("");

    setRounds(prev=>[{generation:gen,attack,defense,verdict,redElo:pop.bestRed().elo,blueElo:pop.bestBlue().elo,tactic:tmpl.tactic},...prev.slice(0,59)]);
    doSnap();
    setPhase("done");
    setStatus(`Gen ${gen} — ${redWon?"🔴 RED":"🔵 BLUE"} gewinnt | ${verdict.reason}`);
    setRunning(false);
  },[running,humanFB,doSnap]);

  useEffect(()=>{loopRef.current=autoLoop;},[autoLoop]);
  useEffect(()=>{
    if(!running&&autoLoop&&loopRef.current){
      const t=setTimeout(()=>{if(loopRef.current) runRound();},900);
      return()=>clearTimeout(t);
    }
  },[running,autoLoop,runRound]);

  const stop=()=>{abortRef.current=true;setAutoLoop(false);setRunning(false);setPhase("idle");setStatus("Gestoppt.");};
  const pc={red:C.red,blue:C.blue,arbiter:C.gold,done:C.green,idle:C.dim}[phase]||C.dim;
  const pl={idle:"BEREIT",red:"RED TEAM",blue:"BLUE TEAM",arbiter:"ARBITER",done:"FERTIG"}[phase]||"";
  const TABS=["arena","population","metrics","memory","rlhf"];

  return(
    <div style={{minHeight:"100vh",background:"#030508",...f,color:"#e8e8e8",padding:"16px 12px"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>

        {/* HEADER */}
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:8,letterSpacing:5,color:C.dim,marginBottom:3}}>ADVERSARIAL TRAINING SYSTEM — OFFLINE</div>
            <h1 style={{margin:0,fontSize:22,fontWeight:800,letterSpacing:-1}}>
              <span style={{color:C.red}}>RED</span>
              <span style={{color:"rgba(255,255,255,0.1)",margin:"0 8px",fontWeight:300}}>vs</span>
              <span style={{color:C.blue}}>BLUE</span>
              <span style={{fontSize:9,fontWeight:400,color:C.dim,marginLeft:8}}>v2.0 · Kein API-Key · Kein Internet</span>
            </h1>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.18)",marginTop:3,letterSpacing:.5}}>
              Simulation Engine · Vector Memory · Population Training · MITRE ATT&CK · ELO Evolution · F1/Precision/Recall
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"5px 10px",borderRadius:5,border:"1px solid",borderColor:tab===t?C.blue:"rgba(255,255,255,0.07)",background:tab===t?`${C.blue}18`:"transparent",color:tab===t?C.blue:C.dim,cursor:"pointer",fontSize:9,...f,letterSpacing:1,textTransform:"uppercase"}}>{t}</button>
            ))}
          </div>
        </div>

        {/* STATS BAR */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:5,marginBottom:12}}>
          {[
            {label:"Gen",      value:snap.gen,                       color:"#fff"},
            {label:"Red ELO",  value:snap.redElo,                    color:C.red},
            {label:"Blue ELO", value:snap.blueElo,                   color:C.blue},
            {label:"F1",       value:snap.f1?.toFixed(3)||"0.000",   color:snap.f1>0.7?C.green:C.gold},
            {label:"Precision",value:snap.prec?.toFixed(3)||"—",     color:C.blue},
            {label:"Recall",   value:snap.rec?.toFixed(3)||"—",      color:C.blue},
            {label:"Memory",   value:`${memory.attackStore.length}A`,color:C.purple},
            {label:"Offline",  value:"✓",                            color:C.green},
          ].map((s,i)=><Stat key={i} label={s.label} value={s.value} color={s.color} s/>)}
        </div>

        {/* ── ARENA ── */}
        {tab==="arena"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 165px 1fr",gap:10,marginBottom:10}}>

            {/* RED */}
            <div style={{border:`1px solid ${phase==="red"?C.red:"rgba(255,42,84,0.2)"}`,borderRadius:10,padding:13,background:"rgba(255,42,84,0.025)",animation:phase==="red"?"glow 1.5s infinite":"none",transition:"border-color .3s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:C.red}}>RED TEAM</div>
                <Tag label={`ELO ${snap.redElo}`} color={C.red}/>
              </div>
              <PopTable popArr={pop.redPop} side="red"/>
              {curAtk&&(<div style={{marginTop:10,borderTop:"1px solid rgba(255,42,84,0.15)",paddingTop:9}}>
                <div style={{fontSize:7,letterSpacing:2,color:C.red,marginBottom:4}}>LETZTER ANGRIFF</div>
                <div style={{fontSize:10,fontWeight:700,color:"#ff6b35",marginBottom:3}}>{curAtk.name}</div>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.35)",lineHeight:1.4,marginBottom:3}}>{curAtk.vector}</div>
                {curAtk.tactic&&<Tag label={MITRE[curAtk.tactic]?.name||curAtk.tactic} color={MITRE[curAtk.tactic]?.color||C.gold}/>}
                <div style={{fontSize:8,color:"rgba(255,255,255,0.2)",marginTop:5}}>Novelty: {curAtk.novelty?.slice(0,70)}</div>
              </div>)}
            </div>

            {/* CENTER */}
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:7,letterSpacing:2,color:pc,marginBottom:3,animation:running?"pulse 1s infinite":"none"}}>{pl}</div>
                <div style={{fontSize:22,opacity:running?1:.25}}>{{red:"⚔",blue:"⬡",arbiter:"⚖",done:"✓",idle:"◎"}[phase]||"◎"}</div>
              </div>
              <EloChart history={pop.history}/>
              <div style={{display:"flex",flexDirection:"column",gap:5,width:"100%"}}>
                <button onClick={runRound} disabled={running} style={{padding:"8px 0",borderRadius:5,border:`1px solid ${C.red}44`,background:running?"rgba(255,255,255,0.02)":`${C.red}14`,color:running?C.dim:C.red,cursor:running?"not-allowed":"pointer",fontSize:9,fontWeight:800,...f,letterSpacing:1}}>▶ RUNDE</button>
                <button onClick={()=>setAutoLoop(v=>!v)} style={{padding:"8px 0",borderRadius:5,border:`1px solid ${autoLoop?C.blue:C.blue+"33"}`,background:autoLoop?`${C.blue}14`:"transparent",color:autoLoop?C.blue:`${C.blue}66`,cursor:"pointer",fontSize:9,fontWeight:800,...f,letterSpacing:1}}>{autoLoop?"⏸ PAUSE":"⟳ AUTO"}</button>
                {running&&<button onClick={stop} style={{padding:"8px 0",borderRadius:5,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:C.dim,cursor:"pointer",fontSize:9,...f}}>■ STOP</button>}
              </div>
              {replaced&&<div style={{fontSize:8,color:C.gold,textAlign:"center",animation:"fadeIn .5s",background:`${C.gold}10`,padding:"3px 8px",borderRadius:4,border:`1px solid ${C.gold}33`}}>↻ Gen {replaced}: Schwächste ersetzt</div>}
            </div>

            {/* BLUE */}
            <div style={{border:`1px solid ${phase==="blue"?C.blue:"rgba(0,229,255,0.2)"}`,borderRadius:10,padding:13,background:"rgba(0,229,255,0.025)",animation:phase==="blue"?"glowB 1.5s infinite":"none",transition:"border-color .3s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:C.blue}}>BLUE TEAM</div>
                <Tag label={`ELO ${snap.blueElo}`} color={C.blue}/>
              </div>
              <PopTable popArr={pop.bluePop} side="blue"/>
              {curDef&&(<div style={{marginTop:10,borderTop:"1px solid rgba(0,229,255,0.15)",paddingTop:9}}>
                <div style={{fontSize:7,letterSpacing:2,color:C.blue,marginBottom:4}}>LETZTE VERTEIDIGUNG</div>
                <div style={{fontSize:10,fontWeight:700,color:C.blue,marginBottom:3}}>{curDef.strategy}</div>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.35)",lineHeight:1.4,marginBottom:3}}>{curDef.detection}</div>
                <Tag label={`FP: ${curDef.fp_risk}`} color={curDef.fp_risk==="high"?C.red:C.gold}/>
                <div style={{fontSize:8,color:"rgba(255,100,100,0.4)",marginTop:5}}>Gap: {curDef.weakness?.slice(0,65)}</div>
              </div>)}
            </div>
          </div>

          {/* STATUS */}
          <div style={{border:`1px solid ${pc}28`,borderRadius:7,padding:"8px 12px",background:`${pc}06`,marginBottom:10,fontSize:9,color:"rgba(255,255,255,0.55)",lineHeight:1.5,minHeight:34}}>
            <span style={{color:pc,fontWeight:700,marginRight:6}}>{pl}</span>{status}
          </div>

          {/* HISTORY */}
          {rounds.length>0
            ?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))",gap:8,maxHeight:400,overflowY:"auto"}}>{rounds.map((r,i)=><RoundCard key={i} round={r}/>)}</div>
            :<div style={{textAlign:"center",padding:"32px 0",color:"rgba(255,255,255,0.1)",fontSize:10,letterSpacing:1}}>Keine Runden — drücke ▶ RUNDE oder ⟳ AUTO</div>
          }
        </>)}

        {/* ── POPULATION ── */}
        {tab==="population"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {[{side:"red",arr:pop.redPop,c:C.red},{side:"blue",arr:pop.bluePop,c:C.blue}].map(({side,arr,c})=>(
              <div key={side} style={{border:`1px solid ${c}22`,borderRadius:10,padding:15,background:`${c}04`}}>
                <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:c,marginBottom:12}}>{side.toUpperCase()} POPULATION</div>
                {[...arr].sort((a,b)=>b.elo-a.elo).map((ag,i)=>(
                  <div key={ag.id} style={{marginBottom:11,padding:9,borderRadius:7,background:i===0?`${c}0a`:"rgba(255,255,255,0.02)",border:`1px solid ${i===0?c+"33":"transparent"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <div style={{fontSize:10,fontWeight:800,color:i===0?c:"rgba(255,255,255,0.5)"}}>{i+1}. {ag.specialization}</div>
                      <div style={{fontSize:12,fontWeight:800,color:c}}>{ag.elo}</div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div>
                        <div style={{fontSize:7,color:C.dim,marginBottom:2}}>{side==="red"?"MUTATION":"LEARNING"}</div>
                        <Bar v={side==="red"?ag.mutationRate:ag.learningRate} color={c} h={5}/>
                        <div style={{fontSize:8,color:c,marginTop:2}}>{((side==="red"?ag.mutationRate:ag.learningRate)*100).toFixed(0)}%</div>
                      </div>
                      <div>
                        <div style={{fontSize:7,color:C.dim,marginBottom:2}}>WIN RATE</div>
                        <Bar v={ag.rounds>0?ag.wins/ag.rounds:0} color={c} h={5}/>
                        <div style={{fontSize:8,color:"rgba(255,255,255,0.4)",marginTop:2}}>{ag.wins}W/{ag.losses}L</div>
                      </div>
                    </div>
                  </div>
                ))}
                <div style={{fontSize:8,color:C.dim,padding:8,background:"rgba(255,255,255,0.02)",borderRadius:6}}>Alle 5 Gen: schwächster → mutierter Klon des besten. Nächster Swap: Gen {Math.ceil((pop.generation+1)/5)*5}</div>
              </div>
            ))}
          </div>
        )}

        {/* ── METRICS ── */}
        {tab==="metrics"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:15}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:C.dim,marginBottom:12}}>KLASSIFIKATIONSMETRIKEN</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:12}}>
                {[
                  {label:"F1-Score",  value:snap.f1?.toFixed(3)||"0.000",color:snap.f1>0.7?C.green:C.gold},
                  {label:"Precision", value:snap.prec?.toFixed(3)||"—",  color:C.blue},
                  {label:"Recall",    value:snap.rec?.toFixed(3)||"—",   color:C.blue},
                  {label:"Weakest",   value:mtrk.weakest()?MITRE[mtrk.weakest()]?.name?.split(" ")[0]||"—":"—",color:C.red},
                ].map((s,i)=><Stat key={i} label={s.label} value={s.value} color={s.color} s/>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:14}}>
                {[{l:"True Pos",v:pop.metrics.tp,c:C.green},{l:"False Pos",v:pop.metrics.fp,c:C.gold},{l:"False Neg",v:pop.metrics.fn,c:C.red},{l:"True Neg",v:pop.metrics.tn,c:C.blue}].map((m,i)=><Stat key={i} label={m.l} value={m.v} color={m.c} s/>)}
              </div>
              <div style={{fontSize:8,color:C.dim,marginBottom:7,letterSpacing:2}}>ELO + F1 VERLAUF</div>
              <EloChart history={pop.history}/>
            </div>
            <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:15}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:C.dim,marginBottom:12}}>MITRE ATT&CK DETECTION RATE</div>
              <MitreMap mtrk={mtrk}/>
              <div style={{marginTop:12}}>
                <div style={{fontSize:8,color:C.dim,marginBottom:7,letterSpacing:2}}>ANGRIFFS-RAUM KARTE</div>
                <AttackMap memory={memory} gen={snap.gen}/>
              </div>
            </div>
          </div>
        )}

        {/* ── MEMORY ── */}
        {tab==="memory"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {[
              {label:"ANGRIFFS-GEDÄCHTNIS",store:memory.attackStore,side:"red",fn:e=>({title:e.attack.name,sub:e.attack.evasion?.slice(0,55),tag:e.outcome==="red"?"BYPASS":"DETECTED",oc:e.outcome})},
              {label:"VERTEIDIGUNGS-GEDÄCHTNIS",store:memory.defenseStore,side:"blue",fn:e=>({title:e.defense.strategy,sub:e.weakness?.slice(0,55),tag:e.blueScore>0.6?"EFFEKTIV":"VERSAGT",oc:e.blueScore>0.6?"blue":"red"})},
            ].map(({label,store,side,fn})=>(
              <div key={side} style={{border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:13}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:2,color:C.dim}}>{label}</div>
                  <Tag label={`${store.length} Einträge`} color={side==="red"?C.red:C.blue}/>
                </div>
                <div style={{maxHeight:340,overflowY:"auto"}}>
                  {store.length===0
                    ?<div style={{fontSize:9,color:C.dim,textAlign:"center",padding:18}}>Noch leer — starte Runden</div>
                    :[...store].reverse().slice(0,20).map((e,i)=>{
                        const d=fn(e),c=d.oc==="red"?C.red:C.blue;
                        return(<div key={i} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",gap:8,alignItems:"flex-start"}}>
                          <div style={{minWidth:20,fontSize:8,color:C.dim}}>#{store.length-i}</div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.7)",marginBottom:1}}>{d.title}</div>
                            <div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>{d.sub}</div>
                          </div>
                          <Tag label={d.tag} color={c}/>
                        </div>);
                      })
                  }
                </div>
                <div style={{marginTop:8,fontSize:8,color:C.dim,padding:7,background:"rgba(255,255,255,0.02)",borderRadius:6}}>Cosine-Similarity-Retrieval: Top-3 ähnlichste Einträge beeinflussen nächste Runde.</div>
              </div>
            ))}
          </div>
        )}

        {/* ── RLHF ── */}
        {tab==="rlhf"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:15}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:C.dim,marginBottom:12}}>HUMAN FEEDBACK (RLHF)</div>
              <p style={{fontSize:10,color:"rgba(255,255,255,0.45)",lineHeight:1.7,marginBottom:12}}>
                Dein Feedback beeinflusst die nächste Runde: das Simulations-System liest es und passt Angriffs- und Verteidigungs-Strategie-Auswahl an. (Offline-Variante: Feedback wird als Kontext-Flag gesetzt.)
              </p>
              <textarea value={pendingFB} onChange={e=>setPending(e.target.value)} placeholder='z.B. "Evasion-Techniken sollen aggressiver werden" oder "Focus auf TA0005 Defense Evasion"' style={{width:"100%",minHeight:85,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:10,color:"#e8e8e8",fontSize:10,...f,lineHeight:1.6,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>{setHumanFB(pendingFB);setPending("");}} disabled={!pendingFB} style={{flex:1,padding:"8px 0",borderRadius:5,border:`1px solid ${C.blue}44`,background:pendingFB?`${C.blue}14`:"transparent",color:pendingFB?C.blue:C.dim,cursor:pendingFB?"pointer":"not-allowed",fontSize:9,fontWeight:800,...f,letterSpacing:1}}>EINREICHEN</button>
                <button onClick={()=>{setHumanFB("");setPending("");}} style={{padding:"8px 12px",borderRadius:5,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:C.dim,cursor:"pointer",fontSize:9,...f}}>RESET</button>
              </div>
              {humanFB&&<div style={{marginTop:10,padding:9,background:`${C.gold}0a`,border:`1px solid ${C.gold}33`,borderRadius:7}}>
                <div style={{fontSize:7,color:C.gold,letterSpacing:2,marginBottom:3}}>AKTIV — nächste Runde</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",lineHeight:1.5}}>{humanFB}</div>
              </div>}
            </div>
            <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:15}}>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:C.dim,marginBottom:12}}>SIMULATION ENGINE — WIE ES FUNKTIONIERT</div>
              {[
                {n:"1",t:"Angriffsauswahl",d:"Zufälliger Template aus 15 MITRE-gemappten Attack-Types mit Seeded-Random",c:C.red},
                {n:"2",t:"Angriffs-Generierung",d:"Deterministische Auswahl aus Vektor-, Payload- und Evasion-DB basierend auf Agent-ELO + Mutation-Rate",c:C.red},
                {n:"3",t:"Verteidigungs-Generierung",d:"Beste passende Defense-Strategie aus 12 Einträgen, gecountert durch failed-Defense-Memory",c:C.blue},
                {n:"4",t:"Arbitrierung",d:"Regelbasierte Bewertung: AttackPower vs DefensePower + Conf-weighted Noise",c:C.gold},
                {n:"5",t:"Evolution",d:"ELO-Update → Mutation/Learning-Rate-Anpassung → Population-Swap alle 5 Gen",c:C.green},
              ].map((s,i)=>(
                <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:`${s.c}18`,border:`1px solid ${s.c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:s.c,minWidth:20}}>{s.n}</div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.7)",marginBottom:1}}>{s.t}</div>
                    <div style={{fontSize:9,color:C.dim,lineHeight:1.5}}>{s.d}</div>
                  </div>
                </div>
              ))}
              <div style={{padding:10,background:"rgba(6,214,160,0.06)",border:`1px solid ${C.green}33`,borderRadius:7,fontSize:9,color:"rgba(255,255,255,0.4)",lineHeight:1.7,marginTop:4}}>
                <strong style={{color:C.green}}>Offline-Vorteil:</strong> Keine Latenz, keine Kosten, kein Rate-Limit. 100 Generationen in 90 Sekunden möglich. Alle Algorithmen (ELO, Cosine-Similarity, Population-Swap) laufen komplett im Browser.
              </div>
            </div>
          </div>
        )}

        <div style={{marginTop:14,fontSize:7,color:"rgba(255,255,255,0.1)",textAlign:"center",letterSpacing:2}}>
          ADVERSARIAL ARENA v2.0 OFFLINE · Simulation Engine · 15 Attack Types · 12 Defense Strategies · MITRE ATT&CK · Population Evolution · Kein API-Key
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
